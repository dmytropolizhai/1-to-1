name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: self-hosted

    # Track overall job status for notifications / downstream jobs
    outputs:
      build-status: ${{ job.status }}
      cache-hit: ${{ steps.pnpm-cache.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'          # built-in pnpm lockfile cache

      # Caches node_modules so pnpm install is skipped on cache hit.
      - name: Cache node_modules
        id: pnpm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        # Skip full install when node_modules cache was restored
        run: |
          if [ "${{ steps.pnpm-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm install --frozen-lockfile
          else
            echo "node_modules restored from cache – skipping install"
          fi

      - name: Lint
        id: lint
        run: |
              mkdir -p lint-results
              pnpm run lint 2>&1 | tee lint-results/report.txt
              exit ${PIPESTATUS[0]} # Preserve the original exit code so the step still fails on errors.
        shell: bash

      - name: Build
        id: build
        run: pnpm run build

      # Artifacts are retained for 7 days and downloadable.
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

      # If lint fails and your linter writes a report file, upload it for review.
      - name: Upload lint report
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: lint-results/       
          retention-days: 3

  # Shows how to reference the artifacts and status from the build job.
  deploy-check:
    runs-on: self-hosted
    needs: build
    if: needs.build.outputs.build-status == 'success' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/

      - name: Report cache efficiency
        run: |
          echo "Cache hit: ${{ needs.build.outputs.cache-hit }}"
          echo "Build SHA: ${{ github.sha }}"
          echo "Artifacts downloaded – ready for deploy"